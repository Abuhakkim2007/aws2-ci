name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4.1.7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.6.1

      - name: Login to Docker Hub
        uses: docker/login-action@v3.2.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t abdulkukkum/aws-ci-d:${{ github.sha }} ./react-profile-main
          docker tag abdulkukkum/aws-ci-d:${{ github.sha }} abdulkukkum/aws-ci-d:latest

      - name: Push Docker Images
        run: |
          docker push abdulkukkum/aws-ci-d:${{ github.sha }}
          docker push abdulkukkum/aws-ci-d:latest

  deploy:
    needs: build-and-push
    runs-on: self-hosted
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Pull Latest Docker Image
        run: |
          sudo docker pull abdulkukkum/aws-ci-d:latest

      - name: Stop Existing Container
        run: |
          sudo docker stop aws-cicd-container || true
          sudo docker rm aws-cicd-container || true

      - name: Run New Container
        run: |
          sudo docker run -d \
            --name aws-cicd-container \
            -p 80:80 \
            --restart always \
            abdulkukkum/aws-ci-d:latest
